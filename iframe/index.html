<!doctype html>
<html>
<head>
	<title>Balance Copper</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body { overflow: hidden; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			font-size: 13px;
			color: #333;
			background: #f5f5f5;
			padding: 6px;
			padding-bottom: 120px;
		}
		.section {
			background: #fff;
			border: 1px solid #e0e0e0;
			border-radius: 4px;
			padding: 6px 10px;
			margin-bottom: 5px;
		}
		.section-title {
			font-size: 12px;
			font-weight: 600;
			color: #666;
			margin-bottom: 4px;
			letter-spacing: 0.5px;
		}
		.row {
			display: flex;
			align-items: center;
			margin-bottom: 4px;
			gap: 6px;
		}
		.row label {
			flex: 0 0 auto;
			font-size: 12px;
			color: #555;
			white-space: nowrap;
		}
		.row input[type="text"] {
			flex: 1;
			width: 60px;
			height: 24px;
			border: 1px solid #ccc;
			border-radius: 3px;
			padding: 0 4px;
			font-size: 12px;
		}
		.radio-group {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
		}
		.radio-group label {
			display: flex;
			align-items: center;
			gap: 3px;
			font-size: 12px;
			cursor: pointer;
		}
		.radio-group input[type="radio"],
		.checkbox-row input[type="checkbox"] {
			margin: 0;
		}
		.checkbox-row {
			display: flex;
			align-items: center;
			gap: 16px;
			margin-top: 2px;
		}
		.checkbox-row label {
			font-size: 12px;
			cursor: pointer;
		}
		.btn-row {
			display: flex;
			gap: 6px;
			margin-top: 2px;
		}
		.btn {
			flex: 1;
			height: 30px;
			border: 1px solid #ccc;
			border-radius: 4px;
			font-size: 12px;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: background 0.15s;
		}
		.btn:hover { background: #e8e8e8; }
		.btn-primary {
			background: #1890ff;
			color: #fff;
			border-color: #1890ff;
		}
		.btn-primary:hover { background: #40a9ff; }
		.btn-stop {
			background: #ff4d4f;
			color: #fff;
			border-color: #ff4d4f;
		}
		.btn-stop:hover { background: #ff7875; }
		.btn-secondary {
			background: #1890ff;
			color: #fff;
			border-color: #1890ff;
		}
		.btn-secondary:hover { background: #40a9ff; }
		.btn-danger {
			background: #ff4d4f;
			color: #fff;
			border-color: #ff4d4f;
		}
		.btn-danger:hover { background: #ff7875; }
		.bottom-bar {
			position: fixed;
			bottom: 0;
			left: 0;
			right: 0;
			background: #f5f5f5;
			z-index: 10;
			padding: 4px 6px 6px;
			border-top: 1px solid #e0e0e0;
		}
		.progress-bar {
			height: 10px;
			background: #e8e8e8;
			border-radius: 5px;
			overflow: hidden;
			display: flex;
			align-items: center;
		}
		.progress-bar-fill {
			height: 5px;
			background: #1890ff;
			border-radius: 3px;
			transition: width 0.3s;
			width: 0%;
		}
	</style>
</head>
<body>
	<div class="section">
		<div class="section-title" data-i18n="Pattern Type"></div>
		<div class="radio-group" id="shapeGroup"></div>
	</div>

	<div class="section">
		<div class="section-title" data-i18n="Pattern Parameters"></div>
		<div class="row">
			<label id="sizeLabel"></label>
			<input type="text" id="patternSize" value="40" />
		</div>
		<div class="row" id="size2Row" style="display:none;">
			<label id="size2Label"></label>
			<input type="text" id="patternSize2" value="20" />
		</div>
		<div class="row">
			<label id="spacingLabel"></label>
			<input type="text" id="patternSpacing" value="30" />
		</div>
		<div class="row">
			<label id="spacing2Label"></label>
			<input type="text" id="patternSpacing2" value="30" />
		</div>
		<div class="row">
			<label id="rotationLabel"></label>
			<input type="text" id="rotationAngle" value="0" />
		</div>
	</div>

	<div class="section">
		<div class="section-title" data-i18n="Operation Options"></div>
		<div class="checkbox-row">
			<label><input type="checkbox" id="stagger" /> <span data-i18n="Stagger"></span></label>
			<label><input type="checkbox" id="layerStagger" /> <span data-i18n="Layer Stagger"></span></label>
			<label><input type="checkbox" id="autoDrc" /> <span data-i18n="Auto DRC"></span></label>
		</div>
	</div>

	<div class="section">
		<div class="section-title" data-i18n="Target Layer"></div>
		<div class="radio-group" id="layerGroup"></div>
	</div>

		<div class="bottom-bar">
			<div class="btn-row" id="actionButtons">
				<button class="btn btn-primary" id="btnGenerate" data-i18n="Generate"></button>
				<button class="btn btn-secondary" id="btnAreaGenerate" data-i18n="Area Generate"></button>
			</div>
			<div class="btn-row" id="clearRow">
				<button class="btn btn-danger" id="btnClear" data-i18n="Clear All"></button>
			</div>
			<div class="btn-row" id="stopRow" style="display:none;">
				<button class="btn btn-stop" id="btnStop" data-i18n="Stop"></button>
			</div>
			<div class="progress-bar"><div class="progress-bar-fill" id="progressBar"></div></div>
		</div>

	<script>
	(function() {
		'use strict';

		var edaObj = (typeof eda !== 'undefined') ? eda : (window.parent && window.parent.eda);
		function t(tag) {
			if (edaObj && edaObj.sys_I18n) return edaObj.sys_I18n.text(tag);
			return tag;
		}

		// Apply data-i18n
		var els = document.querySelectorAll('[data-i18n]');
		for (var i = 0; i < els.length; i++) {
			var key = els[i].getAttribute('data-i18n');
			els[i].textContent = t(key);
		}

		// Shape data: [value, i18n tag]
		var shapes = [
			['dot', 'Dot'], ['square', 'Square'], ['rectangle', 'Rectangle'],
			['diamond', 'Diamond'], ['oval', 'Oval'], ['triangle', 'Triangle'],
			['pentagon', 'Pentagon'], ['hexagon', 'Hexagon'], ['trapezoid', 'Trapezoid']
		];

		// Layer data: [value, i18n tag]
		var layers = [
			['current', 'Current Layer Only'], ['allSignal', 'All Signal Layers'],
			['allMask', 'All Solder Mask Layers'], ['allSignalAndMask', 'All Signal + Mask Layers']
		];

		// Build shape radio buttons
		var shapeGroup = document.getElementById('shapeGroup');
		for (var i = 0; i < shapes.length; i++) {
			var s = shapes[i];
			var lbl = document.createElement('label');
			var inp = document.createElement('input');
			inp.type = 'radio'; inp.name = 'patternType'; inp.value = s[0];
			if (i === 0) inp.checked = true;
			lbl.appendChild(inp);
			lbl.appendChild(document.createTextNode(' ' + t(s[1])));
			shapeGroup.appendChild(lbl);
		}

		// Build layer radio buttons
		var layerGroup = document.getElementById('layerGroup');
		for (var i = 0; i < layers.length; i++) {
			var l = layers[i];
			var lbl = document.createElement('label');
			var inp = document.createElement('input');
			inp.type = 'radio'; inp.name = 'targetLayer'; inp.value = l[0];
			if (i === 0) inp.checked = true;
			lbl.appendChild(inp);
			lbl.appendChild(document.createTextNode(' ' + t(l[1])));
			layerGroup.appendChild(lbl);
		}

		// Set translated messages on parent window for main extension to use
		try {
			window.parent.__bc_msg = {
				clickFirst: t('Click first point'),
				clickSecond: t('Click second point'),
				areaDetected: t('Area detected'),
				areaFailed: t('No area detected'),
				areaDone: t('Area balance copper generation complete'),
				genDone: t('Balance copper generation complete'),
				stopped: t('Generation stopped'),
				drcRunning: t('Running DRC check'),
				drcPassed: t('DRC check passed'),
				drcFailed: t('DRC check found errors'),
				clearing: t('Clearing'),
				clearDone: t('All generated balance copper cleared'),
				noFillToClear: t('No balance copper to clear')
			};
		} catch(e) {}

		// Unit detection
		var currentUnit = 'mil';
		var unitFactor = 1;
		try {
			if (window.parent.__bc_unit) currentUnit = window.parent.__bc_unit;
		} catch(e) {}
		if (currentUnit === 'mil') {
			try {
				var eda = window.parent.eda;
				if (eda && eda.sys_Setting && eda.sys_Setting.getCurrentUnit) {
					var unit = eda.sys_Setting.getCurrentUnit();
					if (unit === 'mm' || unit === 'inch') {
						currentUnit = unit;
						window.parent.__bc_unit = unit;
					}
				}
			} catch(e) {}
		}
		if (currentUnit === 'mm') unitFactor = 39.3701;
		else if (currentUnit === 'inch') unitFactor = 1000;

		var u = '<span class="unitLabel">' + currentUnit + '</span>';

		function evalExpr(val) {
			if (typeof val === 'number') return val;
			val = String(val).trim();
			if (!val) return 0;
			if (!/^[0-9+\-*/().%\s]+$/.test(val)) return parseFloat(val) || 0;
			try {
				var r = Function('"use strict";return (' + val + ')')();
				return typeof r === 'number' && isFinite(r) ? r : 0;
			} catch(e) { return parseFloat(val) || 0; }
		}

		function getVal(id) { var el = document.getElementById(id); return el ? el.value : ''; }

			// Auto-evaluate arithmetic expressions on blur/enter
			function evalAndSet(el) {
				var v = el.value.trim();
				if (!v) return;
				var r = evalExpr(v);
				if (typeof r === 'number' && isFinite(r) && r !== parseFloat(v)) {
					el.value = parseFloat(r.toFixed(4));
				}
			}
			var numericIds = ['patternSize', 'patternSize2', 'patternSpacing', 'patternSpacing2', 'rotationAngle'];
			for (var ni = 0; ni < numericIds.length; ni++) {
				(function(id) {
					var el = document.getElementById(id);
					if (!el) return;
					el.addEventListener('blur', function() { evalAndSet(el); });
					el.addEventListener('keydown', function(e) {
						if (e.key === 'Enter') { e.preventDefault(); evalAndSet(el); el.blur(); }
					});
				})(numericIds[ni]);
			}
		function getNum(id) { return evalExpr(getVal(id)); }
		function getNumInMil(id) { return getNum(id) * unitFactor; }

		function getRadioVal(name) {
			var radios = document.getElementsByName(name);
			for (var i = 0; i < radios.length; i++) if (radios[i].checked) return radios[i].value;
			return '';
		}

		function updateSizeLabel() {
			var type = getRadioVal('patternType');
			var label = document.getElementById('sizeLabel');
			var size2Row = document.getElementById('size2Row');
			var size2Label = document.getElementById('size2Label');

			if (type === 'dot') {
				label.innerHTML = t('Diameter') + ' (' + u + ')';
				size2Row.style.display = 'none';
			} else if (type === 'rectangle' || type === 'oval') {
				label.innerHTML = t('Width') + ' (' + u + ')';
				size2Label.innerHTML = t('Height') + ' (' + u + ')';
				size2Row.style.display = 'flex';
			} else if (type === 'diamond') {
				label.innerHTML = t('Horizontal Diagonal') + ' (' + u + ')';
				size2Label.innerHTML = t('Vertical Diagonal') + ' (' + u + ')';
				size2Row.style.display = 'flex';
			} else if (type === 'triangle') {
				label.innerHTML = t('Base') + ' (' + u + ')';
				size2Label.innerHTML = t('Height') + ' (' + u + ')';
				size2Row.style.display = 'flex';
			} else if (type === 'trapezoid') {
				label.innerHTML = t('Base') + ' (' + u + ')';
				size2Label.innerHTML = t('Height') + ' (' + u + ')';
				size2Row.style.display = 'flex';
			} else if (type === 'pentagon' || type === 'hexagon') {
				label.innerHTML = t('Side Length') + ' (' + u + ')';
				size2Row.style.display = 'none';
			} else {
				label.innerHTML = t('Size') + ' (' + u + ')';
				size2Row.style.display = 'none';
			}
		}

		// Set static labels
		document.getElementById('spacingLabel').innerHTML = t('H-Spacing') + ' (' + u + ')';
		document.getElementById('spacing2Label').innerHTML = t('V-Spacing') + ' (' + u + ')';
		document.getElementById('rotationLabel').textContent = t('Rotation Angle (deg)');

		// Listen for shape changes
		var radios = document.getElementsByName('patternType');
		for (var i = 0; i < radios.length; i++) radios[i].addEventListener('change', updateSizeLabel);

		function collectConfig() {
			var config = {
				pattern: {
					patternType: getRadioVal('patternType'),
					patternSize: getNumInMil('patternSize'),
					patternSpacing: getNumInMil('patternSpacing'),
					patternSpacing2: getNumInMil('patternSpacing2'),
					rotationAngle: getNum('rotationAngle'),
					stagger: document.getElementById('stagger').checked,
					layerStagger: document.getElementById('layerStagger').checked,
				},
				autoDrc: document.getElementById('autoDrc').checked,
				targetLayer: getRadioVal('targetLayer'),
			};
			var tp = config.pattern.patternType;
			if (tp === 'rectangle' || tp === 'diamond' || tp === 'oval' || tp === 'triangle' || tp === 'trapezoid') {
				config.pattern.patternSize2 = getNumInMil('patternSize2');
			}
			return config;
		}

		function validateConfig(config) {
			if (config.pattern.patternSpacing < 0) {
				try { window.parent.__bc_status = { type: 'error', message: t('Spacing cannot be negative') }; } catch(e) {}
				return false;
			}
			if (config.pattern.patternSize < 10) {
				try { window.parent.__bc_status = { type: 'error', message: t('Pattern size cannot be less than 10mil') }; } catch(e) {}
				return false;
			}
			return true;
		}

		function setProgress(pct) {
			document.getElementById('progressBar').style.width = Math.min(100, Math.max(0, pct)) + '%';
		}

		function setGenerating(generating) {
			document.getElementById('actionButtons').style.display = generating ? 'none' : 'flex';
			document.getElementById('clearRow').style.display = generating ? 'none' : 'flex';
			document.getElementById('stopRow').style.display = generating ? 'flex' : 'none';
		}

		function showToast(msg) {
			try {
				window.parent.eda.sys_Message.showToastMessage(msg);
			} catch(e) {
				try {
					var p = window.parent.eda || (window.parent.parent && window.parent.parent.eda);
					if (p) p.sys_Message.showToastMessage(msg);
				} catch(e2) {}
			}
		}

		document.getElementById('btnGenerate').addEventListener('click', function() {
			var config = collectConfig();
			if (!validateConfig(config)) return;
			setGenerating(true);
			setProgress(0);
			try { window.parent.__bc_cmd = { type: 'generate', config: config }; }
			catch(e) { showToast(t('Communication failed') + e.message); setGenerating(false); }
		});

		document.getElementById('btnAreaGenerate').addEventListener('click', function() {
			var config = collectConfig();
			if (!validateConfig(config)) return;
			setGenerating(true);
			setProgress(0);
			try { window.parent.__bc_cmd = { type: 'areaGenerate', config: config }; }
			catch(e) { showToast(t('Communication failed') + e.message); setGenerating(false); }
		});

		document.getElementById('btnStop').addEventListener('click', function() {
			try { window.parent.__bc_cmd = { type: 'cancel' }; showToast(t('Stopping')); } catch(e) {}
		});

		document.getElementById('btnClear').addEventListener('click', function() {
			setGenerating(true);
			setProgress(0);
			try { window.parent.__bc_cmd = { type: 'clear' }; }
			catch(e) { showToast(t('Communication failed') + e.message); setGenerating(false); }
		});

		setInterval(function() {
			try {
				var s = window.parent.__bc_status;
				if (!s) return;
				window.parent.__bc_status = null;
				if (s.type === 'progress') {
					if (typeof s.progress === 'number') setProgress(s.progress);
					if (s.message) showToast(s.message);
				} else if (s.type === 'done') {
					showToast(s.message || t('Done'));
					setProgress(100);
					setGenerating(false);
				} else if (s.type === 'error') {
					showToast(t('Error prefix') + s.message);
					setGenerating(false);
				}
			} catch(e) {}
		}, 200);

		updateSizeLabel();
	})();
	</script>
</body>
</html>
